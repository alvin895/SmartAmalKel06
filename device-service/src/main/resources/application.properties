# =========================
# APPLICATION
# =========================

spring.application.name=device-service
server.port=8081

# =========================
# DATABASE
# =========================

spring.datasource.url=jdbc:mysql://localhost:3306/db_device
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA
# =========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# EUREKA CLIENT
# =========================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# =========================
# MQTT
# =========================

mqtt.broker=tcp://localhost:1883
mqtt.client-id=device-service

mqtt.topic.donation=smartamal/donation
mqtt.topic.security=smartamal/security
mqtt.topic.status=smartamal/status

# =========================
# ACTUATOR
# =========================

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# =========================
# PROMETHEUS
# =========================

management.prometheus.metrics.export.enabled=true

# =========================
# LOGGING
# =========================

logging.level.org.springframework=INFO
logging.level.com.smartamal.device=DEBUG