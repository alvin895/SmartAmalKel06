version: "3.9"

services:

# =====================================================
# MYSQL
# =====================================================

# =====================================================
# MYSQL
# =====================================================

  mysql:

    image: mysql:8.4

    container_name: smartamal-mysql

    restart: unless-stopped

    environment:

      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      TZ: Asia/Jakarta

    ports:

      - "3306:3306"

    volumes:

      - mysql-data:/var/lib/mysql

      - ./mysql/init:/docker-entrypoint-initdb.d

    healthcheck:

      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]

      interval: 10s

      timeout: 5s

      retries: 10

      start_period: 30s

    networks:

      - smartamal-network

# =====================================================
# MQTT
# =====================================================

 # =====================================================
# MQTT (Mosquitto)
# =====================================================

  mosquitto:

    image: eclipse-mosquitto:2

    container_name: smartamal-mosquitto

    hostname: mosquitto

    restart: unless-stopped

    ports:

      - "1883:1883"

      - "9001:9001"

    volumes:

      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf

      - mosquitto-data:/mosquitto/data

      - mosquitto-log:/mosquitto/log

    networks:

      - smartamal-network

    # =====================================================
# EUREKA SERVER
# =====================================================

 # =====================================================
# EUREKA SERVER
# =====================================================

  eureka-server:

    build:
      context: ./eureka-server

    container_name: eureka-server

    hostname: eureka-server

    restart: unless-stopped

    ports:

      - "8761:8761"

    environment:

      SPRING_APPLICATION_NAME: eureka-server

      SERVER_PORT: 8761

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:8761"]

      interval: 15s

      timeout: 5s

      retries: 10

      start_period: 30s

    networks:

      - smartamal-network
# =====================================================
# API GATEWAY
# =====================================================

  # =====================================================
# API GATEWAY
# =====================================================

  api-gateway:

    build:
      context: ./api-gateway

    container_name: api-gateway

    hostname: api-gateway

    restart: unless-stopped

    depends_on:

      - eureka-server

    ports:

      - "9090:9090"

    environment:

      SPRING_APPLICATION_NAME: api-gateway

      SERVER_PORT: 9090

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    networks:

      - smartamal-network
# =====================================================
# AUTH SERVICE
# =====================================================

  # =====================================================
# AUTH SERVICE
# =====================================================

  auth-service:

    build:
      context: ./auth-service

    container_name: auth-service

    hostname: auth-service

    restart: unless-stopped

    depends_on:

      - mysql

      - eureka-server

    ports:

      - "8082:8082"

    environment:

      SPRING_APPLICATION_NAME: auth-service

      SERVER_PORT: 8082

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_auth

      SPRING_DATASOURCE_USERNAME: root

      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    networks:

      - smartamal-network
      # =====================================================
# NOTIFICATION SERVICE
# =====================================================

  # =====================================================
# NOTIFICATION SERVICE
# =====================================================

  notification-service:

    build:
      context: ./notification-service

    container_name: notification-service

    hostname: notification-service

    restart: unless-stopped

    depends_on:

      - mysql

      - eureka-server

    ports:

      - "8083:8083"

    environment:

      SPRING_APPLICATION_NAME: notification-service

      SERVER_PORT: 8083

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_notification

      SPRING_DATASOURCE_USERNAME: root

      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      SPRING_MAIL_HOST: smtp.gmail.com

      SPRING_MAIL_PORT: 587

      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}

      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}

      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true

      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: true

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

    networks:

      - smartamal-network

# =====================================================
# DEVICE SERVICE
# =====================================================

  # =====================================================
# DEVICE SERVICE
# =====================================================

  device-service:

    build:
      context: ./device-service

    container_name: device-service

    hostname: device-service

    restart: unless-stopped

    depends_on:

      - mysql

      - mosquitto

      - notification-service

      - eureka-server

    ports:

      - "8081:8081"

    environment:

      SPRING_APPLICATION_NAME: device-service

      SERVER_PORT: 8081

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_device

      SPRING_DATASOURCE_USERNAME: root

      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      MQTT_BROKER: tcp://mosquitto:1883

      MQTT_CLIENT_ID: device-service

      MQTT_TOPIC_DONATION: smartamal/donation

      MQTT_TOPIC_STATUS: smartamal/status

      MQTT_TOPIC_SECURITY: smartamal/security

      NOTIFICATION_SERVICE_URL: http://notification-service:8083/api/notifications

      NOTIFICATION_DEFAULT_EMAIL: ${NOTIFICATION_EMAIL}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

      JWT_SECRET: ${JWT_SECRET}

    networks:

      - smartamal-network

# =====================================================
# ACCESS CONTROL SERVICE
# =====================================================

  # =====================================================
# ACCESS CONTROL SERVICE
# =====================================================

  access-control-service:

    build:
      context: ./access-control-service

    container_name: access-control-service

    hostname: access-control-service

    restart: unless-stopped

    depends_on:

      - mysql

      - mosquitto

      - notification-service

      - eureka-server

    ports:

      - "8084:8084"

    environment:

      SPRING_APPLICATION_NAME: access-control-service

      SERVER_PORT: 8084

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_access_control

      SPRING_DATASOURCE_USERNAME: root

      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      MQTT_BROKER: tcp://mosquitto:1883

      MQTT_CLIENT_ID: access-control-service

      MQTT_TOPIC_RFID: smartamal/rfid

      MQTT_TOPIC_SECURITY: smartamal/security

      NOTIFICATION_SERVICE_URL: http://notification-service:8083/api/notifications

      NOTIFICATION_DEFAULT_EMAIL: ${NOTIFICATION_EMAIL}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka

      JWT_SECRET: ${JWT_SECRET}

    networks:

      - smartamal-network

      # =====================================================
# PROMETHEUS
# =====================================================

  prometheus:

    image: prom/prometheus:latest

    container_name: prometheus

    restart: unless-stopped

    ports:

      - "9091:9090"

    volumes:

      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

      - prometheus-data:/prometheus

    depends_on:

      - auth-service

      - device-service

      - notification-service

      - access-control-service

      - api-gateway

      - eureka-server

    networks:

      - smartamal-network

# =====================================================
# GRAFANA
# =====================================================

  grafana:

    image: grafana/grafana:latest

    container_name: grafana

    restart: unless-stopped

    ports:

      - "3000:3000"

    environment:

      GF_SECURITY_ADMIN_USER: admin

      GF_SECURITY_ADMIN_PASSWORD: admin123

    volumes:

      - grafana-data:/var/lib/grafana

    depends_on:

      - prometheus

    networks:

      - smartamal-network

      # =====================================================
# ELASTICSEARCH
# =====================================================

  elasticsearch:

    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4

    container_name: elasticsearch

    restart: unless-stopped

    environment:

      discovery.type: single-node

      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

      xpack.security.enabled: "false"

    ports:

      - "9200:9200"

    volumes:

      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml

      - elasticsearch-data:/usr/share/elasticsearch/data

    networks:

      - smartamal-network

# =====================================================
# LOGSTASH
# =====================================================

  logstash:

    image: docker.elastic.co/logstash/logstash:8.13.4

    container_name: logstash

    restart: unless-stopped

    depends_on:

      - elasticsearch

    ports:

      - "5000:5000"

      - "9600:9600"

    volumes:

      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf

    environment:

      LS_JAVA_OPTS: "-Xms256m -Xmx256m"

    networks:

      - smartamal-network

# =====================================================
# KIBANA
# =====================================================

  kibana:

    image: docker.elastic.co/kibana/kibana:8.13.4

    container_name: kibana

    restart: unless-stopped

    depends_on:

      - elasticsearch

    ports:

      - "5601:5601"

    volumes:

      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml

    networks:

      - smartamal-network

# =====================================================
# NGINX
# =====================================================

  nginx:

    image: nginx:latest

    container_name: nginx

    restart: unless-stopped

    depends_on:

      - api-gateway

    ports:

      - "80:80"

    volumes:

      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    networks:

      - smartamal-network

      # =====================================================
# VOLUMES
# =====================================================

volumes:

  mysql-data:

  mosquitto-data:

  mosquitto-log:

  prometheus-data:

  grafana-data:

  elasticsearch-data:

# =====================================================
# NETWORK
# =====================================================

networks:

  smartamal-network:

    driver: bridge