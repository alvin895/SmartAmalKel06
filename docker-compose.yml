# ============================================
# NETWORKS
# ============================================
networks:
  smartamal-network:
    driver: bridge

# ============================================
# VOLUMES
# ============================================
volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_logs:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  logstash_data:

# ============================================
# NOTES
# ============================================
# 1. Update passwords untuk production (MySQL root, Grafana admin)
# 2. Services default ports:
#    - MySQL: 3306
#    - MQTT: 1883
#    - Prometheus: 9090
#    - Grafana: 3000
#    - Elasticsearch: 9200
#    - Kibana: 5601
#    - Nginx: 80
#
# 3. Akses services:
#    - Grafana: http://localhost:3000 (user: admin, password: admin_password)
#    - Prometheus: http://localhost:9090
#    - Kibana: http://localhost:5601
#    - Nginx: http://localhost
#
# 4. Untuk uncomment Java services:
#    - Update path context dan dockerfile sesuai struktur folder
#    - Pastikan Java services sudah di-build (mvn clean package)
#    - Update database URLs sesuai dengan MySQL configuration
#
# 5. Commands:
#    - Start: docker-compose up -d
#    - Stop: docker-compose down
#    - View logs: docker-compose logs -f [service_name]
#    - Rebuild: docker-compose up -d --build
#    - Remove volumes: docker-compose down -v
#
# 6. Production considerations:
#    - Use environment variables untuk sensitive data
#    - Enable HTTPS dengan reverse proxy
#    - Setup monitoring & alerting
#    - Configure logging & log rotation
#    - Setup backup & disaster recovery
#    - Use named volumes untuk persistence
#    - Configure resource limits
