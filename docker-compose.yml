  # device-service:
  #   build:
  #     context: ./device-service
  #     dockerfile: Dockerfile
  #   container_name: smartamal-device-service
  #   environment:
  #     SPRING_APPLICATION_NAME: device-service
  #     SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_device
  #   ports:
  #     - "8082:8082"
  #   depends_on:
  #     - mysql
