####################################################
# SMART AMAL MQTT BROKER
# Mosquitto Configuration
####################################################

# ==================================================
# LISTENER
# ==================================================

listener 1883

protocol mqtt

allow_anonymous true

# ==================================================
# PERSISTENCE
# ==================================================

persistence true

persistence_location /mosquitto/data/

autosave_interval 180

# ==================================================
# LOGGING
# ==================================================

log_dest stdout

log_type error
log_type warning
log_type notice
log_type information

connection_messages true

log_timestamp true

# ==================================================
# MESSAGE LIMIT
# ==================================================

max_queued_messages 1000

message_size_limit 1048576

# ==================================================
# KEEP ALIVE
# ==================================================

max_keepalive 300

# ==================================================
# PERFORMANCE
# ==================================================

max_inflight_messages 100

upgrade_outgoing_qos false

# ==================================================
# RETAIN
# ==================================================

retain_available true

# ==================================================
# SYS TOPIC
# ==================================================

sys_interval 60

# ==================================================
# MQTT TOPIC
# ==================================================
#
# smartamal/donation
# smartamal/status
# smartamal/security
# smartamal/rfid
#
####################################################