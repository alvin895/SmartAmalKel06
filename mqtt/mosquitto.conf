# MQTT Mosquitto Configuration for SMARTAMAL
# ============================================
# File untuk konfigurasi MQTT Broker Mosquitto yang digunakan oleh IoT devices
# Dokumentasi: https://mosquitto.org/man/mosquitto-conf-5.html

# Port listener untuk MQTT
listener 1883
protocol mqtt

# Port listener untuk WebSocket (opsional)
# listener 8884
# protocol websockets

# PID File
pid_file /var/run/mosquitto.pid

# Log file
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Log level (debug, info, notice, warning)
log_type all

# Persistence database
persistence true
persistence_location /mosquitto/data/

# Default authentication - disable untuk development, enable untuk production
# Uncomment untuk production
# allow_anonymous false
# password_file /mosquitto/config/passwd.txt

# ACL (Access Control List) - untuk membatasi akses per user/topic
# acl_file /mosquitto/config/acl.txt

# Maximum concurrent clients
max_connections -1

# Maximum queued messages
max_queued_messages 1000

# Client timeout
idle_timeout 60
