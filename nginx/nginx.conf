# Nginx Configuration for SMARTAMAL
# ==================================
# File untuk konfigurasi Nginx sebagai reverse proxy untuk API services
# Dokumentasi: http://nginx.org/en/docs/

# ============================================
# MAIN CONTEXT
# ============================================

user nginx;

# Auto-detect jumlah CPU cores
worker_processes auto;

# Error log
error_log /var/log/nginx/error.log warn;

# PID file
pid /var/run/nginx.pid;

# ============================================
# EVENTS CONTEXT
# ============================================

events {
  # Maximum connections per worker
  worker_connections 1024;
  
  # Use efficient connection processing method
  use epoll;
}

# ============================================
# HTTP CONTEXT
# ============================================

http {
  # MIME types
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Log format
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  # Access log
  access_log /var/log/nginx/access.log main;

  # Performance optimizations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml text/javascript 
             application/x-javascript application/xml+rss 
             application/json application/javascript;

  # ============================================
  # UPSTREAM DEFINITIONS
  # ============================================
  # Definisi backend services

  # Auth Service upstream
  upstream auth_service {
    server auth-service:8081;
  }

  # Device Service upstream
  upstream device_service {
    server device-service:8082;
  }

  # Access Control Service upstream
  upstream access_control_service {
    server access-control-service:8083;
  }

  # Notification Service upstream
  upstream notification_service {
    server notification-service:8084;
  }

  # ============================================
  # SERVER BLOCK - HTTP REDIRECT
  # ============================================
  # Redirect semua HTTP requests ke HTTPS (opsional untuk production)

  # server {
  #   listen 80;
  #   server_name _;
  #   return 301 https://$host$request_uri;
  # }

  # ============================================
  # SERVER BLOCK - MAIN PROXY
  # ============================================

  server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # ============================================
    # AUTH SERVICE ROUTES
    # ============================================
    location /api/auth/ {
      proxy_pass http://auth_service/;
      
      # Headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # ============================================
    # DEVICE SERVICE ROUTES
    # ============================================
    location /api/devices/ {
      proxy_pass http://device_service/;
      
      # Headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # ============================================
    # ACCESS CONTROL SERVICE ROUTES
    # ============================================
    location /api/access-control/ {
      proxy_pass http://access_control_service/;
      
      # Headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # ============================================
    # NOTIFICATION SERVICE ROUTES
    # ============================================
    location /api/notifications/ {
      proxy_pass http://notification_service/;
      
      # Headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # ============================================
    # HEALTH CHECK ROUTES
    # ============================================
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # ============================================
    # 404 HANDLING
    # ============================================
    location / {
      return 404;
    }
  }
}

# ============================================
# NOTES
# ============================================
# 1. Services harus accessible dari Nginx container dengan nama di definisi upstream
# 2. Untuk production:
#    - Enable HTTPS dengan SSL certificate
#    - Tambahkan rate limiting untuk security
#    - Konfigurasi load balancing jika multiple instances
#    - Setup monitoring dan logging yang lebih detail
#    - Enable HTTP/2 untuk performa lebih baik
# 3. Update upstream servers jika services berubah hostname/port
# 4. Tambahkan cors headers jika mobile app akses dari domain berbeda
# 5. Konfigurasi file ini dapat di-reload tanpa downtime: nginx -s reload
