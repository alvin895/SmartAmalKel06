# ==========================================
# APPLICATION
# ==========================================

spring.application.name=access-control-service
server.port=8084

# ==========================================
# DATABASE
# ==========================================

spring.datasource.url=jdbc:mysql://localhost:3306/db_access_control
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA
# ==========================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# EUREKA
# ==========================================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ==========================================
# JWT
# ==========================================

jwt.secret=smartamaljwtsecretkeysmartamaljwtsecretkey12345
jwt.expiration=86400000

# ==========================================
# MQTT
# ==========================================

mqtt.broker=tcp://localhost:1883

mqtt.client-id=access-control-service

mqtt.topic.rfid=smartamal/rfid

mqtt.topic.security=smartamal/security

# ==========================================
# NOTIFICATION SERVICE
# ==========================================

notification.service.url=http://localhost:8083/api/notifications

# Email Admin (cukup ubah di sini jika berganti)

notification.default.email=muhammadraihan.mrpw@gmail.com

# ==========================================
# ACTUATOR
# ==========================================

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ==========================================
# PROMETHEUS
# ==========================================

management.prometheus.metrics.export.enabled=true

# ==========================================
# LOGGING
# ==========================================

logging.level.org.springframework=INFO
logging.level.com.smartamal.accesscontrol=DEBUG