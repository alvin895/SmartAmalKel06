# ======================================================
# APPLICATION
# ======================================================

spring.application.name=notification-service
server.port=8083

# ======================================================
# DATABASE
# ======================================================

spring.datasource.url=jdbc:mysql://localhost:3306/db_notification
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================================================
# JPA
# ======================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ======================================================
# EUREKA
# ======================================================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ======================================================
# JWT
# ======================================================

jwt.secret=smartamaljwtsecretkeysmartamaljwtsecretkey12345
jwt.expiration=86400000

# ======================================================
# MAIL
# ======================================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=pentagontech006@gmail.com

spring.mail.password=ediwayfzzyoyadkp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

spring.mail.default-encoding=UTF-8

# ======================================================
# ACTUATOR
# ======================================================

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ======================================================
# PROMETHEUS
# ======================================================

management.prometheus.metrics.export.enabled=true

# ======================================================
# LOGGING
# ======================================================

logging.level.org.springframework=INFO
logging.level.com.smartamal.notification=DEBUG