name: smartamal_app
description: "SmartAmal - IoT Device Management Application"

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# Dependencies
dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  # cupertino_icons: ^1.0.2
  # provider: ^6.0.0
  # get: ^4.6.0

  # Networking
  # http: ^1.0.0
  # dio: ^5.0.0

  # Local Storage
  # shared_preferences: ^2.0.0
  # sqflite: ^2.0.0
  # hive: ^2.0.0

  # State Management
  # bloc: ^8.0.0
  # flutter_bloc: ^8.0.0
  # riverpod: ^2.0.0

  # Firebase (opsional untuk push notification)
  # firebase_core: ^2.0.0
  # firebase_messaging: ^14.0.0

  # Logging & Debugging
  # logger: ^1.0.0
  # talker: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^2.0.0
  # linter: ^1.0.0

  # Testing
  # mockito: ^5.0.0
  # integration_test:
  #   sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Design icon font is
  # included with your application, so that you can use the icons in
  # the Material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  #   - images/a_dot_ham.jpeg

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list of maps that have the "asset" and "weight" keys.  For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: assets/fonts/Schyler-Regular.ttf
  #       - asset: assets/fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: assets/fonts/TrajanPro.ttf
  #       - asset: assets/fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

# ============================================
# NOTES
# ============================================
# 1. Uncomment dependencies sesuai kebutuhan project
# 2. Untuk device management, kemungkinan perlu:
#    - HTTP client untuk API calls ke backend
#    - State management (provider, bloc, riverpod)
#    - Local storage untuk caching data
#    - Firebase messaging untuk push notifications
# 3. Update version di repository version control sesuai release
# 4. Untuk production, setup CI/CD pipeline untuk automated builds
# 5. Dokumentasi Flutter: https://flutter.dev
