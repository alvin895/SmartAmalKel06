# Logstash Pipeline Configuration for SMARTAMAL
# ==============================================
# File untuk konfigurasi Logstash pipeline yang mengumpulkan, memproses, dan mengirim logs ke Elasticsearch
# Dokumentasi: https://www.elastic.co/guide/en/logstash/current/configuration.html

# ============================================
# INPUT CONFIGURATION
# ============================================
# Konfigurasi untuk menerima logs dari berbagai sumber

input {
  
  # ============================================
  # 1. BEATS INPUT (dari Filebeat/Metricbeat)
  # ============================================
  # Menerima logs dari Filebeat yang berjalan di container services
  beats {
    port => 5044
    host => "0.0.0.0"
  }

  # ============================================
  # 2. TCP INPUT (alternative untuk logs)
  # ============================================
  # Menerima logs melalui TCP protocol
  # Uncomment jika diperlukan:
  # tcp {
  #   port => 5000
  #   codec => json
  # }

  # ============================================
  # 3. UDP INPUT (alternative untuk logs)
  # ============================================
  # Menerima logs melalui UDP protocol (lebih cepat, tapi less reliable)
  # Uncomment jika diperlukan:
  # udp {
  #   port => 5000
  #   codec => json
  # }
}

# ============================================
# FILTER CONFIGURATION
# ============================================
# Konfigurasi untuk memproses dan transform logs

filter {

  # ============================================
  # 1. JSON PARSING
  # ============================================
  # Parse JSON logs dari Spring Boot services
  if [message] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # ============================================
  # 2. TIMESTAMP PARSING
  # ============================================
  # Parse dan normalize timestamp
  date {
    match => [ "[parsed][timestamp]", "ISO8601" ]
    target => "@timestamp"
  }

  # ============================================
  # 3. FIELD ENRICHMENT
  # ============================================
  # Tambah field tambahan untuk context
  mutate {
    add_field => { "[@metadata][index_name]" => "smartamal-logs-%{+YYYY.MM.dd}" }
  }

  # ============================================
  # 4. FIELD REMOVAL
  # ============================================
  # Hapus field yang tidak diperlukan untuk menghemat storage
  mutate {
    remove_field => [ "message" ]
  }

  # ============================================
  # 5. SERVICE NAME EXTRACTION
  # ============================================
  # Ekstrak service name dari beat hostname atau field lain
  mutate {
    add_field => { "service_name" => "%{[beat][name]}" }
  }

  # ============================================
  # 6. LOG LEVEL CLASSIFICATION
  # ============================================
  # Klasifikasi berdasarkan log level
  if [parsed][level] =~ /ERROR|FATAL/ {
    mutate {
      add_tag => [ "error" ]
    }
  } else if [parsed][level] =~ /WARN/ {
    mutate {
      add_tag => [ "warning" ]
    }
  }
}

# ============================================
# OUTPUT CONFIGURATION
# ============================================
# Konfigurasi untuk mengirim logs ke Elasticsearch

output {

  # ============================================
  # PRIMARY OUTPUT: ELASTICSEARCH
  # ============================================
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    
    # Index name pattern dengan timestamp
    index => "%{[@metadata][index_name]}"
    
    # Document type (deprecated di Elasticsearch 7+, tapi bisa digunakan untuk backward compatibility)
    # document_type => "_doc"
    
    # Retry policy
    retry_on_conflict => 3
    action => "index"
  }

  # ============================================
  # DEBUG OUTPUT (Optional - untuk testing)
  # ============================================
  # Uncomment untuk debug - output logs ke stdout
  # stdout {
  #   codec => rubydebug
  # }

  # ============================================
  # FILE OUTPUT (Optional - untuk backup/archive)
  # ============================================
  # Uncomment untuk menyimpan logs ke file
  # file {
  #   path => "/logs/smartamal-%{+YYYY.MM.dd}.log"
  #   message_format => "%{host} - %{service_name} - %{parsed}"
  # }
}

# ============================================
# NOTES
# ============================================
# 1. Input port 5044 untuk Beats, update di docker-compose.yml jika berubah
# 2. Elasticsearch host harus accessible dari Logstash container
# 3. Index pattern akan membuat index baru setiap hari (smartamal-logs-YYYY.MM.dd)
# 4. Untuk production, tambahkan:
#    - Conditional processing berdasarkan service name
#    - Error handling dan dead letter queue
#    - Custom fields untuk business logic
#    - Grok patterns untuk parsing log formats yang kompleks
# 5. Monitor Logstash performance dan memory usage
