global:
  scrape_interval: 15s

scrape_configs:

  # ==========================================
  # EUREKA SERVER
  # ==========================================

  - job_name: 'eureka-server'

    metrics_path: '/actuator/prometheus'

    static_configs:

      - targets:
          - 'eureka-server:8761'

  # ==========================================
  # API GATEWAY
  # ==========================================

  - job_name: 'api-gateway'

    metrics_path: '/actuator/prometheus'

    static_configs:

      - targets:
          - 'api-gateway:8080'

  # ==========================================
  # AUTH SERVICE
  # ==========================================

  - job_name: 'auth-service'

    metrics_path: '/actuator/prometheus'

    static_configs:

      - targets:
          - 'auth-service:8082'

  # ==========================================
  # DEVICE SERVICE
  # ==========================================

  - job_name: 'device-service'

    metrics_path: '/actuator/prometheus'

    static_configs:

      - targets:
          - 'device-service:8081'

  # ==========================================
  # NOTIFICATION SERVICE
  # ==========================================

  - job_name: 'notification-service'

    metrics_path: '/actuator/prometheus'

    static_configs:

      - targets:
          - 'notification-service:8083'

  # ==========================================
  # ACCESS CONTROL SERVICE
  # ==========================================

  - job_name: 'access-control-service'

    metrics_path: '/actuator/prometheus'

    static_configs:

      - targets:
          - 'access-control-service:8084'