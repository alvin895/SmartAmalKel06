# ==========================================
# APPLICATION
# ==========================================

spring.application.name=api-gateway
server.port=9090

# ==========================================
# EUREKA
# ==========================================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ==========================================
# AUTH SERVICE
# ==========================================

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

# ==========================================
# DEVICE SERVICE
# ==========================================

spring.cloud.gateway.server.webmvc.routes[1].id=device-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://DEVICE-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/device/**

# ==========================================
# NOTIFICATION SERVICE
# ==========================================

spring.cloud.gateway.server.webmvc.routes[2].id=notification-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/notifications/**

# ==========================================
# ACCESS CONTROL SERVICE
# ==========================================

spring.cloud.gateway.server.webmvc.routes[3].id=access-control-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://ACCESS-CONTROL-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/access/**

# ==========================================
# JWT
# ==========================================

jwt.secret=smartamaljwtsecretkeysmartamaljwtsecretkey12345
jwt.expiration=86400000

# ==========================================
# ACTUATOR
# ==========================================

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ==========================================
# PROMETHEUS
# ==========================================

management.prometheus.metrics.export.enabled=true

# ==========================================
# LOGGING
# ==========================================

logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.smartamal.apigateway=DEBUG